services:
  app:
    image: todo-app-backend
    build: .
    ports:
      - 3000:3000

  todo-mongodb:
    image: mongo
    ports:
      - 3456:27017
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: example
      MONGO_INITDB_DATABASE: the_database_todo
    volumes:
      - ./mongo/mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js
      - mongo_data_todo:/data/db

volumes:
  mongo_data_todo: